# sonar-project.properties
# Core Project Identification
sonar.organization=intelligent-traffic-ecosystem
sonar.projectKey=intelligent-traffic-ecosystem_its-main
sonar.projectName=its-main

# Source Code Location
# This tells SonarCloud to scan from the root, which will catch your 'services' submodules
sonar.sources=.

# What files to scan (assuming Python/JS across your microservices)
sonar.inclusions=**/*.py, **/*.js, **/*.ts, **/*.tsx

# Strict Exclusions (Do not waste scan time on config files, tests, or K8s manifests)
sonar.exclusions=**/__pycache__/**, **/tests/**, **/.github/**, **/*.md, **/*.yaml, **/*.yml, Dockerfile, **/node_modules/**

# Python Coverage (If you decide to add PyTest later)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11