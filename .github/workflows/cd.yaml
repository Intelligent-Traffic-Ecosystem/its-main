name: CD - GitOps Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (CI run number)"
        required: true

jobs:
  deploy:
    name: Update GitOps repo and push
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the GitOps (infra) repo ─────────────────────────────
      - name: Checkout GitOps repository
        uses: actions/checkout@v4.2.2
        with:
          repository: Intelligent-Traffic-Ecosystem/its-infrastructure-ops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      # ── 2. Patch the deployment manifest with the new image tag ──────────
      - name: Update image tag in deployment manifest
        run: |
          echo "--- deployment.yaml BEFORE patch ---"
          cat gitops-repo/core/deployment.yaml
          
          # 1. Update the Main Dashboard
          sed -i "s|image:.*its-dashboard:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/its-dashboard:${{ github.event.inputs.image_tag }}|g" gitops-repo/core/deployment.yaml

          # 2. Update the Backend (assuming you create a new manifest for it)
          sed -i "s|image:.*its-dashboard-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/its-dashboard-backend:${{ github.event.inputs.image_tag }}|g" gitops-repo/core/dashboard-backend.yaml

          # 3. Update the Login App
          sed -i "s|image:.*its-dashboard-login:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/its-dashboard-login:${{ github.event.inputs.image_tag }}|g" gitops-repo/core/dashboard-login.yaml

          # sed -i \
          #   "s|image:.*its-ingestor.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/its-ingestor:${{ github.event.inputs.image_tag }}|g" \
          #   gitops-repo/core/deployment.yaml

          echo "--- deployment.yaml AFTER patch ---"
          cat gitops-repo/core/deployment.yaml

      - name: Update image tag in mock-producer manifest
        run: |
          sed -i \
            "s|image:.*its-mock-producer.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/its-mock-producer:${{ github.event.inputs.image_tag }}|g" \
            gitops-repo/k8s/mock-producer.yaml

      # ── 3. Commit and push — ArgoCD will auto-sync the cluster ──────────
      - name: Commit and push manifest update
        working-directory: gitops-repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add core/deployment.yaml core/service.yaml core/dashboard-backend.yaml core/dashboard-login.yaml k8s/mock-producer.yaml

          git commit -m "deploy: its-ingestor, its-mock-producer → tag ${{ github.event.inputs.image_tag }}" \
            || echo "No changes to commit — tag was already up to date"

          git push origin main
