  # ── Build, test, push & scan all service images ─────────────────────────────
  build:
    name: Build → Push → Scan (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── B2 Data Services ───────────────────────────────────────────
          - service: b2-ingestor
            context: services/b2-data
            dockerfile: services/b2-data/docker/Dockerfile.processor
            image: its-ingestor
            repo: main
            test_dir: services/b2-data
            sonar_key: SONAR_PROJECT_KEY

          - service: b2-api
            context: services/b2-data
            dockerfile: services/b2-data/docker/Dockerfile.api
            image: its-api
            repo: main

          # ─── B3 Dashboard Services ──────────────────────────────────────
          - service: its-dashboard-backend
            context: .
            dockerfile: docker/Dockerfile.backend
            image: its-dashboard-backend
            repo: dashboard

          - service: its-dashboard-login
            context: .
            dockerfile: docker/Dockerfile.login
            image: its-dashboard-login
            repo: dashboard
            build_args: >-
              --build-arg BACKEND_URL=https://its.csproject.org
              --build-arg NEXT_PUBLIC_AUTH_LOGIN_URL=https://its.csproject.org/login/api/auth/login

          - service: its-dashboard-control
            context: .
            dockerfile: docker/Dockerfile.traffic-dashboard
            image: its-dashboard-control
            repo: dashboard
            build_args: >-
              --build-arg NEXT_PUBLIC_BACKEND_URL=https://its.csproject.org
              --build-arg NEXT_PUBLIC_LOGIN_APP_URL=https://its.csproject.org/login
              --build-arg NEXT_PUBLIC_AUTH_LOGIN_URL=https://its.csproject.org/login
              --build-arg NEXT_PUBLIC_TRAFFIC_DASHBOARD_HOME_PATH=/dashboard

          - service: its-dashboard-admin
            context: .
            dockerfile: docker/Dockerfile.admin-dashboard
            image: its-dashboard-admin
            repo: dashboard
            build_args: >-
              --build-arg NEXT_PUBLIC_BACKEND_URL=https://its.csproject.org
              --build-arg NEXT_PUBLIC_LOGIN_APP_URL=https://its.csproject.org/login
              --build-arg NEXT_PUBLIC_AUTH_LOGIN_URL=https://its.csproject.org/login

          - service: its-dashboard-public
            context: .
            dockerfile: docker/Dockerfile.public-app
            image: its-dashboard-public
            repo: dashboard
            build_args: >-
              --build-arg NEXT_PUBLIC_PUBLIC_APP_HOME_PATH=/dashboard

          # ─── B1 Mock Producer ───────────────────────────────────────────
          - service: mock-producer
            context: services/b1-detection
            dockerfile: services/b1-detection/Dockerfile.mock
            image: its-mock-producer
            repo: main

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout Dashboard UI repository
        if: matrix.repo == 'dashboard'
        uses: actions/checkout@v4.2.2
        with:
          repository: Intelligent-Traffic-Ecosystem/its-dashboard-ui
          token: ${{ secrets.ORG_SUBMODULE_TOKEN }}
          path: '.'

      - name: Checkout its-main repository
        if: matrix.repo == 'main'
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.ORG_SUBMODULE_TOKEN }}
          submodules: recursive
          path: '.'

      # ── Test (only for services that have tests) ────────────────────────
      - name: Check tests exist
        id: check-tests
        run: |
          if [ -n "${{ matrix.test_dir }}" ] && [ -f "${{ matrix.test_dir }}/requirements.txt" ] && [ -d "${{ matrix.test_dir }}/tests" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.check-tests.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check-tests.outputs.exists == 'true'
        working-directory: ${{ matrix.test_dir }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        if: steps.check-tests.outputs.exists == 'true'
        working-directory: ${{ matrix.test_dir }}
        run: |
          pytest tests/ -v \
            --ignore=tests/integration \
            --ignore=tests/test_api_routes.py \
            --ignore=tests/test_dashboard_routes.py \
            --ignore=tests/test_endpoints.py \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Run integration tests
        if: steps.check-tests.outputs.exists == 'true'
        working-directory: ${{ matrix.test_dir }}
        run: pytest tests/integration/ -v --tb=short --timeout=120

      - name: SonarCloud Scan
        if: steps.check-tests.outputs.exists == 'true' && matrix.sonar_key
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SUBMODULE_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ matrix.test_dir }}
          args: >
            -Dsonar.projectKey=${{ secrets[matrix.sonar_key] }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}

      # ── Build & Push ────────────────────────────────────────────────────
      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Dockerfile not found at ${{ matrix.dockerfile }} — skipping build"
          fi

      - name: Log in to Docker Hub
        if: steps.check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        if: steps.check.outputs.exists == 'true'
        env:
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_ID }}
        run: |
          MAPBOX_ARG=""
          if [ "${{ matrix.service }}" = "its-dashboard-public" ] || [ "${{ matrix.service }}" = "its-dashboard-admin" ]; then
            MAPBOX_ARG="--build-arg NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}"
          fi
          GMAPS_ARGS=""
          if [ "${{ matrix.service }}" = "its-dashboard-control" ]; then
            GMAPS_ARGS="--build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY} --build-arg NEXT_PUBLIC_GOOGLE_MAPS_ID=${NEXT_PUBLIC_GOOGLE_MAPS_ID}"
          fi
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.run_number }} \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.build_args || '' }} \
            ${MAPBOX_ARG} \
            ${GMAPS_ARGS} \
            ${{ matrix.context }}

      - name: Push image to Docker Hub
        if: steps.check.outputs.exists == 'true'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.run_number }}

      # ── Security Scan ───────────────────────────────────────────────────
      - name: Scan image with Trivy
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.run_number }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ── Trigger CD only on main after all builds pass ─────────────────────────
  trigger-cd:
    name: Trigger CD
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger CD Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CD_WORKFLOW_TRIGGER_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd.yaml',
              ref: 'main',
              inputs: {
                image_tag: "${{ github.run_number }}"
              }
            });
