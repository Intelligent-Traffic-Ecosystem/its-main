name: CI -  Test, Build, Scan, and Trigger CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test all Python services ───────────────────────────────────────────────
  test:
    name: Test & Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
 
    strategy:
      fail-fast: false
      matrix:
        include:
  #         - service: b1-detection
  #           dir: services/b1-detection
  #           sonar_key: SONAR_PROJECT_KEY_B1
  #
          - service: b2-data
            dir: services/b2-data
            sonar_key: SONAR_PROJECT_KEY
  #
  #         - service: b3-dashboard
  #           dir: services/b3-dashboard
  #           sonar_key: SONAR_PROJECT_KEY_B3
  #
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.ORG_SUBMODULE_TOKEN }}
          submodules: recursive
          fetch-depth: 0
  
      - name: Check tests exist
        id: check
        run: |
          if [ -f "${{ matrix.dir }}/requirements.txt" ] && [ -d "${{ matrix.dir }}/tests" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No tests found for ${{ matrix.service }} — skipping"
          fi
  
      - name: Set up Python 3.11
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
  
      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
  
      - name: Run pytest with coverage
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          pytest tests/ -v \
            --ignore=tests/integration \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
  
      - name: Run integration tests (b2-data)
        if: steps.check.outputs.exists == 'true' && matrix.service == 'b2-data'
        working-directory: ${{ matrix.dir }}
        run: pytest tests/integration/ -v --tb=short --timeout=120
  
      - name: SonarCloud Scan
        if: steps.check.outputs.exists == 'true'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SUBMODULE_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ matrix.dir }}
          args: >
            -Dsonar.projectKey=${{ secrets[matrix.sonar_key] }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}

  # ── Build, push & scan all service images ─────────────────────────────────
  build:
    name: Build → Push → Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          # - service: b1-detector
          #   context: services/b1-detection
          #   dockerfile: services/b1-detection/Dockerfile
          #   image: its-detector

            - service: b2-ingestor
              context: services/b2-data
              dockerfile: services/b2-data/docker/Dockerfile.processor
              image: its-ingestor

            - service: b2-api
              context: services/b2-data
              dockerfile: services/b2-data/docker/Dockerfile.api
              image: its-api

          # 1. The Backend Service
            - service: its-dashboard-backend
              context: .
              dockerfile: docker/Dockerfile.backend
              image: its-dashboard-backend

            # 2. The Login App
            - service: its-dashboard-login
              context: .
              dockerfile: docker/Dockerfile.login
              image: its-dashboard-login
              build_args: >-
                --build-arg BACKEND_URL=https://its.csproject.org/api

            # 3. The Main Traffic Dashboard (What ArgoCD currently tracks)
            - service: its-dashboard
              context: .
              dockerfile: docker/Dockerfile.traffic-dashboard
              image: its-dashboard
              build_args: >-
                --build-arg NEXT_PUBLIC_BACKEND_URL=https://its.csproject.org/api
                --build-arg NEXT_PUBLIC_LOGIN_APP_URL=https://its.csproject.org/login

            - service: mock-producer
              context: services/b1-detection
              dockerfile: services/b1-detection/Dockerfile.mock
              image: its-mock-producer

    steps:
      # - name: Checkout repository
      #   uses: actions/checkout@v4.2.2
      #   with:
      #     token: ${{ secrets.ORG_SUBMODULE_TOKEN }}
      #     submodules: recursive
      - name: Checkout Dashboard UI repository
        if: startsWith(matrix.service, 'its-dashboard')
        uses: actions/checkout@v4.2.2
        with:
          repository: Intelligent-Traffic-Ecosystem/its-dashboard-ui
          token: ${{ secrets.ORG_SUBMODULE_TOKEN }}
          path: '.'
      # We checkout its-main for the Mock Producer
      - name: Checkout its-main repository
        if: matrix.service == 'mock-producer'
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.ORG_SUBMODULE_TOKEN }}
          submodules: recursive
          path: '.'    

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Dockerfile not found at ${{ matrix.dockerfile }} — skipping build"
          fi

      - name: Log in to Docker Hub
        if: steps.check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        if: steps.check.outputs.exists == 'true'
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.run_number }} \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.build_args || '' }} \
            ${{ matrix.context }}

      - name: Push image to Docker Hub
        if: steps.check.outputs.exists == 'true'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.run_number }}

      - name: Scan image with Trivy
        if: steps.check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.run_number }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ── Trigger CD only on main after all builds pass ─────────────────────────
  trigger-cd:
    name: Trigger CD
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger CD Workflow
        uses: actions/github-script@v7
        with:
          # We pass our new fine-grained token here instead of the default
          github-token: ${{ secrets.CD_WORKFLOW_TRIGGER_TOKEN }} 
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd.yaml',
              ref: 'main',
              inputs: {
                image_tag: "${{ github.run_number }}"
              }
            });
