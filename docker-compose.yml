# Full system docker-compose — brings up all services together.
# For individual group development, use each group's own docker-compose.yml.

services:
  # ===== Shared Infrastructure =====
  kafka:
    image: soldevelo/kafka
    ports:
      - "9092:9092"     # in-cluster only — host access goes through the b2-data dev compose
    environment:
      # soldevelo/kafka is Bitnami-derived → requires KAFKA_CFG_* prefix
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      # Kafka 4.1+ standalone: no QUORUM_VOTERS — auto-configures
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: "its-main-cluster-001"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traffic}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ===== B1 — Device & Edge Systems =====
  b1-detector:
    build:
      context: ./services/b1-detection
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_OUTPUT: ${KAFKA_TOPIC_INPUT:-traffic.events.raw}
    restart: on-failure

  # ===== B2 — Data & Intelligence =====
  b2-stream-processor:
    build:
      context: ./services/b2-data
      dockerfile: docker/Dockerfile.processor
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_INPUT: ${KAFKA_TOPIC_INPUT:-traffic.events.raw}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-traffic}
    restart: on-failure

  b2-api:
    build:
      context: ./services/b2-data
      dockerfile: docker/Dockerfile.api
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-traffic}
    restart: on-failure

  # ===== B3 — Dashboard & Visualization =====
  b3-backend:
    build:
      context: ./services/b3-dashboard
      dockerfile: docker/Dockerfile.backend
    depends_on:
      - b2-api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-its-realm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-b3-dashboard}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:-http://localhost:5000/api/auth/callback}
      ADMIN_DASHBOARD_URL: ${ADMIN_DASHBOARD_URL:-http://localhost:3001}
      TRAFFIC_DASHBOARD_URL: ${TRAFFIC_DASHBOARD_URL:-http://localhost:3000}
      LOGIN_APP_URL: ${LOGIN_APP_URL:-http://localhost:3003}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3003}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL:-http://localhost:5000}
      B2_API_BASE_URL: ${B2_API_BASE_URL:-http://b2-api:8000}
      B2_WS_URL: ${B2_WS_URL:-ws://b2-api:8000/ws/metrics}
      B2_REQUEST_TIMEOUT_MS: ${B2_REQUEST_TIMEOUT_MS:-5000}
      B2_WS_RECONNECT_MS: ${B2_WS_RECONNECT_MS:-3000}
      TRAFFIC_STALE_AFTER_SECONDS: ${TRAFFIC_STALE_AFTER_SECONDS:-30}
    restart: on-failure

  b3-traffic-dashboard:
    build:
      context: ./services/b3-dashboard
      dockerfile: docker/Dockerfile.traffic-dashboard
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5000}
        NEXT_PUBLIC_LOGIN_APP_URL: ${NEXT_PUBLIC_LOGIN_APP_URL:-http://localhost:3003}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_GOOGLE_MAPS_ID: ${NEXT_PUBLIC_GOOGLE_MAPS_ID:-}
    depends_on:
      - b3-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:5000}
      NEXT_PUBLIC_LOGIN_APP_URL: ${NEXT_PUBLIC_LOGIN_APP_URL:-http://localhost:3003}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_GOOGLE_MAPS_ID: ${NEXT_PUBLIC_GOOGLE_MAPS_ID:-}
    restart: on-failure

  b3-login:
    build:
      context: ./services/b3-dashboard
      dockerfile: docker/Dockerfile.login
      args:
        BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
    depends_on:
      - b3-backend
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
    restart: on-failure

volumes:
  pgdata:
