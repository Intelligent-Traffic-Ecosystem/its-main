# Full system docker-compose — brings up all services together.
# For individual group development, use each group's own docker-compose.yml.

services:
  # ===== Shared Infrastructure =====
  kafka:
    image: soldevelo/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "its-main-cluster-001"

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traffic}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ===== B1 — Device & Edge Systems =====
  b1-detector:
    build:
      context: ./services/b1-detection
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_OUTPUT: ${KAFKA_TOPIC_INPUT:-traffic.events.raw}
    restart: on-failure

  # ===== B2 — Data & Intelligence =====
  b2-stream-processor:
    build:
      context: ./services/b2-data
      dockerfile: docker/Dockerfile.processor
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_INPUT: ${KAFKA_TOPIC_INPUT:-traffic.events.raw}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-traffic}
    restart: on-failure

  b2-api:
    build:
      context: ./services/b2-data
      dockerfile: docker/Dockerfile.api
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-traffic}
    restart: on-failure

  # ===== B3 — Dashboard & Visualization =====
  b3-dashboard:
    build:
      context: ./services/b3-dashboard
      dockerfile: Dockerfile
    depends_on:
      - b2-api
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    restart: on-failure

volumes:
  pgdata:
